# Use a real node_modules tree (not Yarn PnP). Required so Turbopack — a Rust
# binary that resolves packages from the filesystem — can find next/package.json
# in CI. Without this, CI falls back to Yarn 4's PnP default (no node_modules)
# and `next build` fails with a workspace-root / "couldn't find Next.js" error.
nodeLinker: node-modules
